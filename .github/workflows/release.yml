name: release

on:
  workflow_dispatch:
  push:
    tags:
      - v*

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - platform: win-x64
            os: ubuntu-latest
          - platform: win-arm64
            os: ubuntu-latest
          - platform: linux-x64
            os: ubuntu-latest
          - platform: osx-x64
            os: macos-latest
          - platform: osx-arm64
            os: macos-latest

    steps:
      - uses: actions/checkout@v6
      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Build
        run: dotnet publish -c Release -r ${{ matrix.platform }} -p:PublishTrimmed=true --artifacts-path ${{ matrix.platform }}
      - name: Archive release
        run: cd ${{ matrix.platform }}/publish/ModUploader/release_${{ matrix.platform }} && zip ${{ github.workspace }}/ModUploader-${{ matrix.platform }}.zip ./* -r
      - name: Upload release
        uses: actions/upload-artifact@v7
        with:
          name: ModUploader-${{ matrix.platform }}
          path: ModUploader-${{ matrix.platform }}.zip

  release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    needs: build
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v3
        with: 
          files: artifacts/**
          fail_on_unmatched_files: true
          draft: true
